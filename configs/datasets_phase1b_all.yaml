# Protocol D: Dataset registry for the universality sprint (Phase 1b, "radio + WISE + low-z")
# Notes
# - Keep this file as the single source of truth for dataset-specific column names, depth proxies, and default cuts.
# - Paths are examples. Point them at your local raw data (do NOT commit large catalogues).
# - Default binning uses quantiles to avoid arbitrary bin edges.
# - You can disable any dataset by setting `enabled: false`.

version: "phase1b-v0"
defaults:
  fit_nside: 64
  map_nside: 64
  frame: "galactic"
  bmin_deg: 20
  depth_bins_quantiles: [0.0, 0.30, 0.70, 1.0]   # bright / mid / faint by proxy quantiles
  z_bins_quantiles:     [0.0, 0.30, 0.70, 1.0]   # low / mid / high by z quantiles
  region_splits:
    ra_jackknife_deg: [[0, 90], [90, 180], [180, 270], [270, 360]]
    dec_split: true
    ecliptic_lat_split_deg: 30

datasets:
  - id: "sixdfgs_dr3"
    enabled: true
    label: "6dFGS DR3 (southern galaxies)"
    tracer_class: "galaxy"
    family: "sixdfgs"
    source_note: "VizieR asu FITS BINTABLE; redshift proxy from cz (km/s) if z column absent."
    input:
      kind: "fits"
      path: "data/raw/6dFGS_DR3.asu.fit"
    columns:
      ra_deg:  "RAJ2000"
      dec_deg: "DEJ2000"
      z:
        kind: "cz_kms"
        column: "cz"
        c_kms: 299792.458
      depth_proxy:
        kind: "magnitude"
        column: "bJmag"
        brighter_is_higher: false
    cuts:
      bmin_deg: 20
      cz_kms_min: 1
      # q_cz_min: 4
    binning:
      z_bins: "quantiles"
      depth_bins: "none"

  - id: "wise_assef_r90"
    enabled: true
    label: "WISE AGN (Assef et al. R90)"
    tracer_class: "agn"
    family: "wise_mid_ir"
    source_note: "Assef R90 catalogue; use built-in extragalactic mask if provided."
    input:
      kind: "fits"
      path: "data/raw/WISE_Assef_R90.fit"
    columns:
      ra_deg:  "ra"
      dec_deg: "dec"
      z: null
      depth_proxy:
        kind: "magnitude"
        column: "w2mpro"
        brighter_is_higher: false
    masks:
      footprint:
        kind: "catalogue_mask"
        note: "Preferred. If absent, rely on bmin + optional ecliptic split."
    cuts:
      bmin_deg: 20
    binning:
      z_bins: "none"
      depth_bins: "quantiles"

  - id: "wise_allwise_agn_secrest"
    enabled: true
    label: "AllWISE AGN (Secrest-style selection)"
    tracer_class: "agn"
    family: "wise_mid_ir"
    source_note: "Alternative mid-IR selection on AllWISE; useful as a selection-operator swap."
    input:
      kind: "fits"
      path: "data/raw/AllWISE_AGN_Secrest.fits"
    columns:
      ra_deg:  "ra"
      dec_deg: "dec"
      z: null
      depth_proxy:
        kind: "magnitude"
        column: "w2mpro"
        brighter_is_higher: false
    masks:
      footprint:
        kind: "catalogue_mask"
        note: "If absent, rely on bmin + optional ecliptic split."
    cuts:
      bmin_deg: 20
    binning:
      z_bins: "none"
      depth_bins: "quantiles"

  - id: "nvss"
    enabled: true
    label: "NVSS (1.4 GHz radio sources)"
    tracer_class: "radio"
    family: "vla_radio"
    source_note: "VizieR NVSS; use integrated flux as depth proxy."
    input:
      kind: "fits"
      path: "data/raw/NVSS_vizier.fit"
    columns:
      ra_deg:  "RAJ2000"
      dec_deg: "DEJ2000"
      z: null
      depth_proxy:
        kind: "flux_mjy"
        column: "S1.4"
        brighter_is_higher: true
    cuts:
      bmin_deg: 20
      flux_mjy_min: 10
    binning:
      z_bins: "none"
      depth_bins: "quantiles"

  - id: "racs_dr1"
    enabled: true
    label: "RACS DR1 (ASKAP radio continuum)"
    tracer_class: "radio"
    family: "askap_radio"
    source_note: "RACS DR1 (galcut recommended); use total flux as depth proxy."
    input:
      kind: "fits"
      path: "data/raw/RACS_DR1_galcut.fit"
    columns:
      ra_deg:  "RAJ2000"
      dec_deg: "DEJ2000"
      z: null
      depth_proxy:
        kind: "flux_mjy"
        column: "Ftot"
        brighter_is_higher: true
    cuts:
      bmin_deg: 20
      flux_mjy_min: 5
    binning:
      z_bins: "none"
      depth_bins: "quantiles"

  - id: "sdss_dr16q"
    enabled: false
    label: "SDSS DR16Q (spectroscopic quasars)"
    tracer_class: "quasar"
    family: "sdss_optical"
    source_note: "Optional in Phase 1b. Enable if available."
    input:
      kind: "fits"
      path: "data/raw/DR16Q_v4.fit"
    columns:
      ra_deg:  "RA"
      dec_deg: "DEC"
      z:       "Z"
      depth_proxy:
        kind: "magnitude"
        column: "i"
        brighter_is_higher: false
    cuts:
      bmin_deg: 20
      z_range: [0.0, 7.0]
    binning:
      z_bins: "quantiles"
      depth_bins: "none"
